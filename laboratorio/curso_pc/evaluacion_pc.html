<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación: Pensamiento Crítico - CPEE</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cafe: #2B1B12;
            --naranja: #d35a34;
            --crema: #fff1da;
            --purpura-critico: #4a2b4d;
            --purpura-claro: #6a446d;
            --texto-suave: #4a3828;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--crema);
            color: var(--cafe);
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            font-family: 'DM Serif Display', serif;
            color: var(--purpura-critico);
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .instrucciones {
            text-align: center;
            color: var(--texto-suave);
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--crema);
        }
        .pregunta-card {
            margin-bottom: 30px;
            padding: 20px;
            background: #fafafa;
            border-left: 4px solid var(--purpura-critico);
            border-radius: 4px;
        }
        .pregunta-texto {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .opciones label {
            display: block;
            margin-bottom: 10px;
            padding: 12px 15px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.5;
        }
        .opciones label:hover {
            border-color: var(--purpura-claro);
            background: #fdfaf6;
        }
        .opciones input[type="radio"] {
            margin-right: 10px;
            accent-color: var(--purpura-critico);
        }
        .btn-enviar {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--purpura-critico);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 40px;
            transition: background 0.3s;
        }
        .btn-enviar:hover {
            background: var(--purpura-claro);
        }
        .btn-enviar:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        /* Pantalla de bloqueo */
        #pantalla-bloqueo {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--crema);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <h2 id="bloqueo-texto" style="font-family: 'DM Serif Display', serif; color: var(--cafe); font-size: 2rem;">Verificando credenciales...</h2>
        <p id="bloqueo-subtexto">Analizando tu progreso en el curso.</p>
        <button id="btn-volver" style="display:none; margin-top: 20px; padding: 10px 20px; background: var(--purpura-critico); color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="window.location.href='pc_inicio.html'">Volver al Inicio</button>
    </div>

    <div class="container" id="contenedor-examen" style="display: none;">
        <h1>Evaluación: Pensamiento Crítico</h1>
        <div class="instrucciones">
            <p>Demuestra tu capacidad de análisis. Tienes un máximo de <strong>3 intentos</strong> para aprobar. <br>Necesitas al menos <strong>12 aciertos (8.0)</strong> para obtener tu constancia.</p>
            <p style="color: var(--naranja); font-weight: bold;" id="intentos-restantes-texto"></p>
        </div>

        <form id="formulario-evaluacion">
            
            <div id="preguntas-placeholder">
                </div>

            <button type="submit" class="btn-enviar" id="btn-enviar">Terminar Examen y Calificar</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5YZCAHcrMA36PmgpOxmHnTOI6zgZNMgg",
            authDomain: "cpee-plataforma-a655a.firebaseapp.com",
            projectId: "cpee-plataforma-a655a",
            storageBucket: "cpee-plataforma-a655a.firebasestorage.app",
            messagingSenderId: "684415102099",
            appId: "1:684415102099:web:3f2b649a34386677a87166"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const pantallaBloqueo = document.getElementById('pantalla-bloqueo');
        const contenedorExamen = document.getElementById('contenedor-examen');
        const txtBloqueo = document.getElementById('bloqueo-texto');
        const subTxtBloqueo = document.getElementById('bloqueo-subtexto');
        const btnVolver = document.getElementById('btn-volver');
        const txtIntentos = document.getElementById('intentos-restantes-texto');
        const btnEnviar = document.getElementById('btn-enviar');

        // CLAVE DE RESPUESTAS (Asegúrate de que coincidan con las tuyas)
        const respuestasCorrectas = {
            q1: "A", q2: "B", q3: "A", q4: "C", q5: "B",
            q6: "B", q7: "B", q8: "A", q9: "B", q10: "A",
            q11: "A", q12: "C", q13: "B", q14: "A", q15: "B"
        };

        let userRef;
        let userData;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "../../login.html"; 
                return;
            }

            userRef = doc(db, "progreso_usuarios", user.uid);
            const docSnap = await getDoc(userRef);

            if (!docSnap.exists() || docSnap.data().acceso_pc !== true) {
                window.location.href = "pc_inicio.html";
                return;
            }

            userData = docSnap.data();

            // 1. Ya aprobó antes
            if (userData.examen_pc_aprobado === true) {
                txtBloqueo.innerText = "¡Ya aprobaste la evaluación!";
                txtBloqueo.style.color = "var(--purpura-critico)";
                subTxtBloqueo.innerText = "Tu constancia está lista para ser generada.";
                btnVolver.innerText = "Ir a solicitar mi Constancia";
                
                // REDIRECCIÓN UNIFICADA A CONSTANCIA
                btnVolver.onclick = () => window.location.href = "constancia_pc.html";
                
                btnVolver.style.display = "inline-block";
                return;
            }

            // (Validación de módulos completos omitida por brevedad)

            // 3. Verificar intentos
            let intentos = userData.intentos_examen_pc || 0;
            if (intentos >= 3) {
                txtBloqueo.innerText = "Límite de intentos alcanzado";
                txtBloqueo.style.color = "var(--naranja)";
                subTxtBloqueo.innerText = "Has agotado tus 3 intentos para este curso.";
                btnVolver.style.display = "inline-block";
                return;
            }

            // Mostrar examen
            pantallaBloqueo.style.display = "none";
            contenedorExamen.style.display = "block";
            txtIntentos.innerText = `Intento ${intentos + 1} de 3`;
        });

        // Al calificar
        document.getElementById('formulario-evaluacion').addEventListener('submit', async (e) => {
            e.preventDefault();
            btnEnviar.disabled = true;
            btnEnviar.innerText = "Calificando...";

            const formData = new FormData(e.target);
            let aciertos = 0;

            for (let [pregunta, respuesta] of formData.entries()) {
                if (respuestasCorrectas[pregunta] === respuesta) {
                    aciertos++;
                }
            }

            let calificacion = (aciertos / 15) * 10;
            let intentosActuales = (userData.intentos_examen_pc || 0) + 1;

            if (calificacion >= 8.0) {
                await setDoc(userRef, {
                    examen_pc_aprobado: true,
                    calificacion_final_pc: calificacion,
                    intentos_examen_pc: intentosActuales
                }, { merge: true });

                alert(`¡Felicidades! Obtuviste ${aciertos}/15 (${calificacion.toFixed(1)}). Has aprobado el curso.`);
                
                // REDIRECCIÓN FINAL A CONSTANCIA
                window.location.href = "constancia_pc.html";
                
            } else {
                await setDoc(userRef, {
                    intentos_examen_pc: intentosActuales
                }, { merge: true });

                if (intentosActuales >= 3) {
                    alert(`Calificación: ${calificacion.toFixed(1)}. Has agotado tus 3 intentos. Examen bloqueado.`);
                    window.location.reload();
                } else {
                    alert(`Obtuviste ${aciertos}/15 (${calificacion.toFixed(1)}). Necesitas al menos 12 aciertos (8.0). Te quedan ${3 - intentosActuales} intentos.`);
                    window.location.reload();
                }
            }
        });
    </script>
</body>
</html>
